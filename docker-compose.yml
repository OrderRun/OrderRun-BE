version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: orderrun-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: orderrun
      MYSQL_USER: orderrun_user
      MYSQL_PASSWORD: orderrun_pass
      TZ: UTC
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    networks:
      - orderrun-network

  redis:
    image: redis:7-alpine
    container_name: orderrun-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - orderrun-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  orderrun-network:
    driver: bridge
