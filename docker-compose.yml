version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: orderrun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-orderrun}
      MYSQL_USER: ${DB_USERNAME:-orderrun_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-orderrun_pass}
      TZ: Asia/Seoul
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - orderrun-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 개발 편의를 위한 phpMyAdmin (선택사항)
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: orderrun-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-orderrun_user}
      PMA_PASSWORD: ${DB_PASSWORD:-orderrun_pass}
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - mysql
    networks:
      - orderrun-network
    profiles:
      - dev  # docker-compose --profile dev up 으로만 실행

volumes:
  mysql_data:
    driver: local

networks:
  orderrun-network:
    driver: bridge
