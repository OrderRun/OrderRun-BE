<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OrderRun{% endblock %}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', sans-serif;
            background-color: #f5f5f5;
            color: #333333;
            line-height: 1.6;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            background-color: #4A90E2;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
        }
        .content h2 {
            color: #333333;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .content p {
            color: #666666;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background-color: #4A90E2;
            color: #ffffff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 600;
            margin: 20px 0;
        }
        .button:hover {
            background-color: #357ABD;
        }
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid #4A90E2;
            padding: 15px 20px;
            margin: 20px 0;
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            font-size: 14px;
            color: #999999;
        }
        .footer a {
            color: #4A90E2;
            text-decoration: none;
        }
        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{% block header_title %}OrderRun{% endblock %}</h1>
        </div>
        <div class="content">
            {% block content %}
            <!-- Email content goes here -->
            {% endblock %}
        </div>
        <div class="footer">
            {% block footer %}
            <p>
                이 이메일은 OrderRun에서 발송되었습니다.<br>
                문의사항이 있으시면 <a href="mailto:support@orderrun.com">support@orderrun.com</a>으로 연락해주세요.
            </p>
            <p>
                &copy; {{ current_year|default(2025) }} OrderRun. All rights reserved.
            </p>
            {% endblock %}
        </div>
    </div>
</body>
</html>
