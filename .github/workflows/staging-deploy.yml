name: Staging Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/orderrun
  DOCKER_IMAGE_TAG: staging-${{ github.sha }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      APP_ENV: test
      APP_DEBUG: "false"
      SECRET_KEY: staging-secret-key-change-me-32-chars
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USERNAME: orderrun_user
      DB_PASSWORD: orderrun_pass
      DB_NAME: orderrun_test
      JWT_SECRET: staging-jwt-secret-key-change-me-32-chars
      KAKAO_CLIENT_ID: mock-kakao-client-id
      KAKAO_CLIENT_SECRET: mock-kakao-client-secret
      KAKAO_REDIRECT_URI: http://localhost:8000/api/v1/auth/kakao/callback
      APPLE_CLIENT_ID: mock-apple-client-id
      APPLE_TEAM_ID: mock-apple-team-id
      APPLE_KEY_ID: mock-apple-key-id
      APPLE_PRIVATE_KEY_PATH: ./keys/apple-private-key.p8
      APPLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/apple/callback
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8000"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --retries 10 --timeout 100 -e ".[dev]"

      - name: Run unit tests
        run: |
          mkdir -p test-results
          pytest tests --ignore-glob='*_integration.py' --junitxml=test-results/unit.xml

      - name: Run integration tests
        run: |
          mkdir -p test-results
          integration_tests=(tests/*_integration.py)
          if [ ${#integration_tests[@]} -eq 0 ]; then
            echo "No integration tests found"
            exit 0
          fi
          pytest "${integration_tests[@]}" --junitxml=test-results/integration.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:staging-latest
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:staging-buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE_NAME }}:staging-buildcache,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.docker_build.outputs.digest }}"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.STG_EC2_SSH_KEY }}" > ~/.ssh/staging.pem
          chmod 600 ~/.ssh/staging.pem
          ssh-keyscan -H "${{ secrets.STG_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create deployment directory on EC2
        run: |
          ssh -i ~/.ssh/staging.pem "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}" << 'EOF'
            mkdir -p ~/orderrun
          EOF

      - name: Copy deployment files to EC2
        run: |
          scp -i ~/.ssh/staging.pem \
            docker-compose.staging.yml \
            "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}:~/orderrun/"

          scp -i ~/.ssh/staging.pem \
            scripts/deploy.sh \
            scripts/staging-smoke-test.sh \
            "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}:~/orderrun/"

          scp -i ~/.ssh/staging.pem -r \
            nginx \
            "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}:~/orderrun/"

      - name: Deploy application
        run: |
          ssh -i ~/.ssh/staging.pem "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}" << 'EOF'
            set -euo pipefail

            cd ~/orderrun

            cat > .env << 'ENVEOF'
DOCKER_IMAGE=${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
APP_ENV=staging
APP_DEBUG=false
SECRET_KEY=staging-secret-key-change-me-32-chars
DB_HOST=${{ secrets.STG_MYSQL_HOST }}
DB_PORT=${{ secrets.STG_MYSQL_PORT }}
DB_USERNAME=${{ secrets.STG_MYSQL_USER }}
DB_PASSWORD=${{ secrets.STG_MYSQL_PASSWORD }}
DB_NAME=${{ secrets.STG_MYSQL_DATABASE }}
MYSQL_HOST=${{ secrets.STG_MYSQL_HOST }}
MYSQL_PORT=${{ secrets.STG_MYSQL_PORT }}
MYSQL_USER=${{ secrets.STG_MYSQL_USER }}
MYSQL_PASSWORD=${{ secrets.STG_MYSQL_PASSWORD }}
MYSQL_DATABASE=${{ secrets.STG_MYSQL_DATABASE }}
JWT_SECRET=${{ secrets.STG_JWT_SECRET }}
KAKAO_CLIENT_ID=mock-kakao-client-id
KAKAO_CLIENT_SECRET=mock-kakao-client-secret
KAKAO_REDIRECT_URI=http://localhost:8000/api/v1/auth/kakao/callback
APPLE_CLIENT_ID=mock-apple-client-id
APPLE_TEAM_ID=mock-apple-team-id
APPLE_KEY_ID=mock-apple-key-id
APPLE_PRIVATE_KEY_PATH=./keys/apple-private-key.p8
APPLE_REDIRECT_URI=http://localhost:8000/api/v1/auth/apple/callback
SERVER_HOST=0.0.0.0
SERVER_PORT=8000
AWS_SNS_REGION=${{ secrets.STG_AWS_SNS_REGION }}
AWS_SNS_ACCESS_KEY_ID=${{ secrets.STG_AWS_SNS_ACCESS_KEY_ID }}
AWS_SNS_SECRET_ACCESS_KEY=${{ secrets.STG_AWS_SNS_SECRET_ACCESS_KEY }}
AWS_SNS_SMS_SENDER_ID=${{ secrets.STG_AWS_SNS_SMS_SENDER_ID }}
EC2_PUBLIC_IP=${{ secrets.STG_EC2_HOST }}
ENABLE_SSL=false
ENVEOF

            chmod +x deploy.sh staging-smoke-test.sh
            ./deploy.sh
          EOF

      - name: Verify deployment
        run: |
          sleep 30
          curl -f "http://${{ secrets.STG_EC2_HOST }}/v1/health" || exit 1
          ssh -i ~/.ssh/staging.pem "${{ secrets.STG_EC2_USERNAME }}@${{ secrets.STG_EC2_HOST }}" << 'EOF'
            cd ~/orderrun
            BASE_URL=http://localhost ./staging-smoke-test.sh
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/staging.pem

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment successful to staging environment"
          else
            echo "Deployment failed"
            exit 1
          fi
