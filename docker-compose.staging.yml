version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: orderrun-redis-staging
    profiles:
      - staging
    restart: unless-stopped
    volumes:
      - redis_staging_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - orderrun-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  app:
    image: ${DOCKER_IMAGE:-orderrun:latest}
    container_name: orderrun-app-staging
    profiles:
      - staging
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DB_HOST: ${MYSQL_HOST:?MYSQL_HOST is required}
      DB_PORT: ${MYSQL_PORT:-3306}
      DB_USERNAME: ${MYSQL_USER:?MYSQL_USER is required}
      DB_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      DB_NAME: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      AWS_SNS_REGION: ${AWS_SNS_REGION:-ap-northeast-2}
      AWS_SNS_ACCESS_KEY_ID: ${AWS_SNS_ACCESS_KEY_ID:-}
      AWS_SNS_SECRET_ACCESS_KEY: ${AWS_SNS_SECRET_ACCESS_KEY:-}
      AWS_SNS_SMS_SENDER_ID: ${AWS_SNS_SMS_SENDER_ID:-Kkobongdan}
      AWS_SNS_SMS_TYPE: ${AWS_SNS_SMS_TYPE:-Transactional}
    expose:
      - "8000"
    networks:
      - orderrun-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:8000/v1/health\", timeout=5)); assert data[\"success\"] is True and data[\"data\"][\"status\"] == \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: ./nginx
    container_name: orderrun-nginx-staging
    profiles:
      - staging
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      EC2_PUBLIC_IP: ${EC2_PUBLIC_IP:-43.200.56.9}
      ENABLE_SSL: ${ENABLE_SSL:-false}
    ports:
      - "80:80"
    volumes:
      - certbot_staging_www:/var/www/certbot
      - letsencrypt_staging:/etc/letsencrypt:ro
    networks:
      - orderrun-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    container_name: orderrun-certbot-staging
    profiles:
      - staging-ssl
    volumes:
      - certbot_staging_www:/var/www/certbot
      - letsencrypt_staging:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "echo 'Set STAGING_DOMAIN and LETSENCRYPT_EMAIL, then run certbot with the ssl profile after DNS is ready.'"

volumes:
  redis_staging_data:
    driver: local
  certbot_staging_www:
    driver: local
  letsencrypt_staging:
    driver: local

networks:
  orderrun-network:
    name: orderrun-staging-network
    driver: bridge
